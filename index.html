<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>plan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f7f5; --surface: #ffffff; --text: #1a1a1a; --muted: #6b7280;
  --border: #e5e7eb; --green: #2d6a4f; --green-light: #d8f3dc;
  --amber: #d97706; --amber-light: #fef3c7; --blue: #2563eb; --blue-light: #dbeafe;
  --purple: #7c3aed; --pink: #db2777; --red: #dc2626;
  --radius: 12px; --nav: 68px; --hdr: 56px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 430px; margin: 0 auto; }
.hdr { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: var(--hdr); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
.hdr-logo { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
.hdr-week { font-size: 12px; color: var(--muted); }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: var(--nav); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: 0.4px; transition: color 0.15s; }
.nav-tab.active { color: var(--green); }
.nav-tab svg { width: 22px; height: 22px; }
.main { padding-top: var(--hdr); padding-bottom: calc(var(--nav) + 8px); }
.view { display: none; padding: 18px 16px; }
.view.active { display: block; }
.sec { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; margin-top: 22px; }
.sec:first-child { margin-top: 0; }
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 8px; }
.day-strip { display: flex; gap: 7px; overflow-x: auto; padding: 2px 16px 14px; margin: 0 -16px; -ms-overflow-style: none; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-btn { flex-shrink: 0; width: 46px; height: 62px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: all 0.15s; }
.day-btn.active { border-color: var(--green); background: var(--green); }
.day-btn.fast-day { border-color: var(--amber); background: var(--amber-light); }
.day-btn.active.fast-day { background: var(--amber); border-color: var(--amber); }
.day-btn.is-today:not(.active) { border-color: var(--blue); }
.day-dname { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; }
.day-btn.active .day-dname { color: rgba(255,255,255,0.75); }
.day-dnum { font-size: 17px; font-weight: 700; color: var(--text); }
.day-btn.active .day-dnum { color: #fff; }
.day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); }
.day-btn.active .day-dot { background: rgba(255,255,255,0.6); }
.day-btn.fast-day .day-dot { background: var(--amber); }
.meal-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 15px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.meal-card:active { border-color: var(--green); }
.meal-type { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 3px; }
.meal-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.meal-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.fast-banner { background: var(--amber-light); border: 1.5px solid var(--amber); border-radius: var(--radius); padding: 22px 16px; text-align: center; }
.fast-title { font-size: 17px; font-weight: 700; color: #92400e; margin-bottom: 5px; }
.fast-note { font-size: 13px; color: #b45309; }
.day-note { background: var(--green-light); border-radius: 8px; padding: 9px 13px; margin-bottom: 10px; font-size: 12px; color: var(--green); font-weight: 500; }
.wo-badge { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; margin-bottom: 14px; }
.wo-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.wo-note { font-weight: 400; color: var(--muted); }
.wo-header { border-radius: var(--radius); padding: 18px 16px; margin-bottom: 14px; color: #fff; }
.wo-session-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; opacity: 0.75; margin-bottom: 3px; }
.wo-session-name { font-size: 21px; font-weight: 700; margin-bottom: 3px; }
.wo-session-note { font-size: 13px; opacity: 0.8; }
.ex-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 14px; margin-bottom: 8px; }
.ex-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
.ex-name { font-size: 14px; font-weight: 600; flex: 1; }
.ex-sets { font-size: 11px; color: var(--muted); font-weight: 500; white-space: nowrap; }
.ex-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
.ex-chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.chip-tempo { background: #fef3c7; color: #92400e; }
.chip-breathe { background: var(--blue-light); color: #1e40af; }
.ex-side { font-size: 11px; font-weight: 500; color: var(--green); background: var(--green-light); border-radius: 6px; padding: 6px 10px; margin-bottom: 7px; line-height: 1.5; }
.ex-tip { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }
.set-row { display: flex; gap: 8px; }
.set-grp { flex: 1; }
.set-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
.set-inp { width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; font-weight: 500; background: var(--bg); color: var(--text); text-align: center; }
.set-inp:focus { outline: none; border-color: var(--green); }
.mob-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; }
.mob-name { font-size: 14px; font-weight: 500; }
.mob-dur { font-size: 12px; color: var(--muted); }
.rest-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px 16px; text-align: center; }
.rest-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.rest-note { font-size: 13px; color: var(--muted); }
.done-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green-light); color: var(--green); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; margin-bottom: 12px; }
.btn { display: block; width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--green); color: #fff; }
.btn-outline { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
.btn-mt { margin-top: 16px; }
.rec-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 9px; cursor: pointer; }
.rec-bar { height: 6px; }
.rec-body { padding: 13px 15px; }
.rec-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.rec-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.rec-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.rec-time { font-size: 11px; color: var(--muted); }
.rec-ingr { font-size: 12px; color: var(--muted); line-height: 1.5; }
.rec-expanded { border-top: 1px solid var(--border); margin-top: 11px; padding-top: 11px; display: none; }
.rec-card.open .rec-expanded { display: block; }
.step-item { display: flex; gap: 9px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
.step-n { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.shop-item { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.shop-item:last-child { border-bottom: none; }
.shop-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.shop-item.checked .shop-check { border-color: var(--green); background: var(--green); }
.shop-name { font-size: 14px; flex: 1; transition: color 0.15s; }
.shop-item.checked .shop-name { text-decoration: line-through; color: var(--muted); }
.shop-qty { font-size: 12px; color: var(--muted); }
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 3px; }
.stat-val { font-size: 26px; font-weight: 700; }
.stat-unit { font-size: 14px; font-weight: 400; color: var(--muted); }
.stat-delta { font-size: 11px; margin-top: 3px; }
.d-down { color: var(--green); } .d-up { color: var(--red); }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.chart-ttl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 10px; }
canvas.chart { width: 100%; height: 150px; display: block; }
.log-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 14px; }
.log-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 13px; }
.fld-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 5px; }
.fld-inp { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 17px; font-weight: 500; color: var(--text); background: var(--bg); }
.fld-inp:focus { outline: none; border-color: var(--green); }
.fld-unit { font-size: 11px; color: var(--muted); margin-top: 3px; }
.log-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.log-entry:last-child { border-bottom: none; }
.log-date { color: var(--muted); }
.log-vals { display: flex; gap: 14px; }
.log-val { font-weight: 600; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px 44px; width: 100%; max-height: 82vh; overflow-y: auto; }
.modal-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 19px; font-weight: 700; margin-bottom: 3px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
.modal-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; margin-top: 16px; }
.ingr-item { display: flex; align-items: baseline; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.ingr-item:last-child { border-bottom: none; }
.ingr-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 2px; }
/* supplements */
.supp-block { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 13px; margin-bottom: 10px; }
.supp-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--blue); margin-bottom: 7px; }
.supp-row { font-size: 11px; display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #dbeafe; gap: 8px; }
.supp-row:last-child { border-bottom: none; }
.supp-timing { font-weight: 600; color: #1e40af; white-space: nowrap; }
.supp-items { color: #3b82f6; text-align: right; }
/* snack card */
.snack-card { background: var(--surface); border-radius: var(--radius); border: 1px dashed #c4b5fd; padding: 10px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.snack-card:active { border-color: var(--purple); }
.snack-time { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--purple); margin-bottom: 2px; }
/* warm-up */
.warmup-item { display: flex; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; margin-bottom: 6px; align-items: flex-start; }
.warmup-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--blue-light); color: var(--blue); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.warmup-body { flex: 1; }
.warmup-name { font-size: 13px; font-weight: 600; margin-bottom: 1px; }
.warmup-dur { font-size: 11px; color: var(--blue); font-weight: 500; }
.warmup-note { font-size: 11px; color: var(--muted); line-height: 1.4; margin-top: 3px; }
/* corrective mobility */
.corr-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; margin-bottom: 7px; }
.corr-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
.corr-name { font-size: 14px; font-weight: 600; }
.corr-dur { font-size: 11px; color: var(--blue); font-weight: 600; white-space: nowrap; }
.corr-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-logo">plan</span>
  <span class="hdr-week" id="hdr-week"></span>
</header>

<main class="main">
  <div class="view active" id="view-week">
    <div class="day-strip" id="day-strip"></div>
    <div id="day-content"></div>
  </div>
  <div class="view" id="view-workout">
    <div class="day-strip" id="wo-day-strip"></div>
    <div id="wo-content"></div>
  </div>
  <div class="view" id="view-recipes">
    <div id="rec-list"></div>
  </div>
  <div class="view" id="view-shopping">
    <div class="sec">this week's list</div>
    <div id="shop-list"></div>
    <button class="btn btn-outline btn-mt" onclick="clearChecks()">clear completed</button>
  </div>
  <div class="view" id="view-progress">
    <div class="stat-row" id="stat-row"></div>
    <div class="chart-wrap">
      <div class="chart-ttl">weight trend (kg)</div>
      <canvas class="chart" id="w-chart"></canvas>
    </div>
    <div class="sec">log this week</div>
    <div class="log-form">
      <div class="log-fields">
        <div>
          <div class="fld-lbl">weight</div>
          <input type="number" class="fld-inp" id="inp-weight" placeholder="98.0" step="0.1">
          <div class="fld-unit">kg</div>
        </div>
        <div>
          <div class="fld-lbl">body fat</div>
          <input type="number" class="fld-inp" id="inp-bf" placeholder="—" step="0.1">
          <div class="fld-unit">%</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="logProgress()">save check-in</button>
    </div>
    <div class="sec">history</div>
    <div class="card" style="padding:0 16px"><div id="prog-hist"></div></div>
  </div>
</main>

<nav class="nav">
  <button class="nav-tab active" onclick="switchView('week',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>week
  </button>
  <button class="nav-tab" onclick="switchView('workout',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4v16M18 4v16M4 12h4M16 12h4M8 8h8M8 16h8"/></svg>workout
  </button>
  <button class="nav-tab" onclick="switchView('recipes',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>recipes
  </button>
  <button class="nav-tab" onclick="switchView('shopping',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>shop
  </button>
  <button class="nav-tab" onclick="switchView('progress',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>progress
  </button>
</nav>

<div class="modal-overlay" id="rec-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>

  ], snacks:[
    {time:'10:30am',name:'cottage cheese bowl',desc:'150g cottage cheese · cucumber · cherry tomatoes',recipe:'cottage-cheese-bowl'},

  ]},
  friday:    { type:'normal', meals:[
    {type:'breakfast',name:'eggs & avocado toast',desc:'2 boiled eggs, wholegrain toast, mashed avocado, chilli flakes',recipe:'egg-avocado'},
    {type:'lunch',name:'chickpea spinach curry',desc:'chickpeas, spinach, coconut milk, spices, brown rice',recipe:'chickpea-curry'},
    {type:'dinner',name:'mackerel & mediterranean veg',desc:'pan-seared mackerel, roasted courgette, peppers, tomatoes',recipe:'mackerel-veg'}
  ], snacks:[
    {time:'10:30am',name:'walnuts & dark chocolate',desc:'30g walnuts · 2–3 squares 70%+ dark choc',recipe:'walnuts-dark-choc'},
    {time:'3:30pm',name:'hard-boiled eggs',desc:'2–3 eggs · salt, pepper',recipe:'boiled-eggs'}

const BFAST_IDS   = ['overnight-oats','yogurt-bowl','oat-porridge','egg-avocado','protein-smoothie','refeed-breakfast'];
const SNACK_IDS   = ['protein-shake','boiled-eggs','salmon-cucumber','walnuts-dark-choc','cottage-cheese-bowl','almond-celery','roasted-chickpeas'];
const DESSERT_IDS = ['choc-protein-mousse','chia-pudding','banana-nice-cream','protein-balls','yogurt-bark'];
const CAT_COLORS  = { breakfast:'var(--blue)', 'lunch & dinner':'var(--green)', snacks:'var(--purple)', desserts:'var(--pink)' };

function recCat(id) {
  if (BFAST_IDS.includes(id))   return 'breakfast';
  if (SNACK_IDS.includes(id))   return 'snacks';
  if (DESSERT_IDS.includes(id)) return 'desserts';
  return 'lunch & dinner';
}

const gs = k => { try { const v = localStorage.getItem('hplan_'+k); return v ? JSON.parse(v) : null; } catch(e) { return null; } };
const ss = (k,v) => { try { localStorage.setItem('hplan_'+k, JSON.stringify(v)); } catch(e) {} };

const TODAY  = DAYS[new Date().getDay()];
let selDay   = TODAY;
let selWoDay = TODAY;

function init() {
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
  document.getElementById('hdr-week').textContent = fmt(ws) + ' – ' + fmt(we);
  renderDayStrip(); renderDayContent(selDay);
  renderWoDayStrip(); renderWorkout(); renderRecipes(); renderShopping(); renderProgress();
}

function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'progress') setTimeout(() => drawChart(gs('progress_log') || []), 60);
}

// ── week view ──
function renderDayStrip() {
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  document.getElementById('day-strip').innerHTML = DAYS.map((day,i) => {
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const plan = MEAL_PLAN[day];
    const isFast = plan.type === 'fast', isSel = day === selDay, isToday = day === TODAY;
    const hasMeals = plan.meals && plan.meals.length > 0;
    let cls = 'day-btn';
    if (isSel) cls += ' active';
    if (isFast) cls += ' fast-day';
    if (isToday && !isSel) cls += ' is-today';
    return `<button class="${cls}" onclick="selectDay('${day}')">
      <span class="day-dname">${DSHORT[i]}</span>
      <span class="day-dnum">${d.getDate()}</span>
      <span class="day-dot" style="${!hasMeals?'opacity:0':''}"></span>
    </button>`;
  }).join('');
}

function selectDay(day) { selDay = day; renderDayStrip(); renderDayContent(day); }

function renderDayContent(day) {
  const plan = MEAL_PLAN[day], wo = WO_PLAN[day];
  let h = '';
  if (wo) h += `<div class="wo-badge" style="color:${wo.color}"><span class="wo-dot" style="background:${wo.color}"></span>${wo.label}<span class="wo-note"> — ${wo.note}</span></div>`;
  if (plan.type === 'fast') {
    h += `<div class="fast-banner"><div class="fast-title">36h fast</div><div class="fast-note">${plan.note}</div></div>`;
  } else {
    if (plan.note) h += `<div class="day-note">${plan.note}</div>`;
    // supplements
    h += `<div class="supp-block"><div class="supp-title">supplements</div>`;
    SUPPLEMENTS.forEach(s => { h += `<div class="supp-row"><span class="supp-timing">${s.timing}</span><span class="supp-items">${s.items}</span></div>`; });
    h += `</div>`;
    // interleaved meals + snacks: breakfast → morning snack → lunch → afternoon snack → dinner
    const snacks = plan.snacks || [], m = plan.meals;
    const slots = [
      m[0]       ? {kind:'meal',  ...m[0]}       : null,
      snacks[0]  ? {kind:'snack', ...snacks[0]}  : null,
      m[1]       ? {kind:'meal',  ...m[1]}       : null,
      snacks[1]  ? {kind:'snack', ...snacks[1]}  : null,
      m[2]       ? {kind:'meal',  ...m[2]}       : null
    ].filter(Boolean);
    slots.forEach(slot => {
      if (slot.kind === 'meal') {
        h += `<div class="meal-card" onclick="openRecipeModal('${slot.recipe}')"><div class="meal-type">${slot.type}</div><div class="meal-name">${slot.name}</div><div class="meal-desc">${slot.desc}</div></div>`;
      } else {
        h += `<div class="snack-card" onclick="openRecipeModal('${slot.recipe}')"><div class="snack-time">${slot.time}</div><div class="meal-name">${slot.name}</div><div class="meal-desc">${slot.desc}</div></div>`;
      }
    });
  }
  document.getElementById('day-content').innerHTML = h;
}

// ── workout view ──
function getWeekKey() {
  const n = new Date(), j = new Date(n.getFullYear(),0,1);
  return n.getFullYear()+'_W'+Math.ceil(((n-j)/86400000+j.getDay()+1)/7);
}

function renderWoDayStrip() {
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  const WO_TYPE_DOT = {strength:'var(--green)', mobility:'var(--blue)', rest:'var(--muted)', walk:'var(--muted)'};
  document.getElementById('wo-day-strip').innerHTML = DAYS.map((day,i) => {
    const d = new Date(ws); d.setDate(ws.getDate()+i);
    const wo = WO_PLAN[day];
    const isSel = day === selWoDay, isToday = day === TODAY;
    let cls = 'day-btn';
    if (isSel) cls += ' active';
    if (isToday && !isSel) cls += ' is-today';
    const dotColor = WO_TYPE_DOT[wo.type] || 'var(--muted)';
    return `<button class="${cls}" onclick="selectWoDay('${day}')">
      <span class="day-dname">${DSHORT[i]}</span>
      <span class="day-dnum">${d.getDate()}</span>
      <span class="day-dot" style="background:${dotColor}"></span>
    </button>`;
  }).join('');
}

function selectWoDay(day) { selWoDay = day; renderWoDayStrip(); renderWorkout(); }

function renderExCard(ex, session, weights) {
  const wR = weights[ex.name+'_R'] || '';
  const wL = weights[ex.name+'_L'] || '';
  const wS = weights[ex.name] || '';
  let h = `<div class="ex-card">`;
  h += `<div class="ex-top"><span class="ex-name">${ex.name}</span><span class="ex-sets">${ex.setsLabel} · ${ex.rest}</span></div>`;
  if (ex.repsLabel) h += `<div style="font-size:11px;color:var(--blue);font-weight:600;margin-bottom:6px">${ex.repsLabel}</div>`;
  if (ex.tempo || ex.breathe) {
    h += `<div class="ex-chips">`;
    if (ex.tempo)   h += `<span class="ex-chip chip-tempo">↕ ${ex.tempo}</span>`;
    if (ex.breathe) h += `<span class="ex-chip chip-breathe">◉ ${ex.breathe}</span>`;
    h += `</div>`;
  }
  if (ex.side) h += `<div class="ex-side">${ex.side}</div>`;
  h += `<div class="ex-tip">${ex.tip}</div>`;
  if (ex.asymmetric) {
    h += `<div class="set-row">
      <div class="set-grp"><div class="set-lbl">right (kg)</div><input type="number" class="set-inp" placeholder="—" value="${wR}" step="0.5" onchange="saveW('${session}','${ex.name}_R',this.value)"></div>
      <div class="set-grp"><div class="set-lbl">left (kg)</div><input type="number" class="set-inp" placeholder="—" value="${wL}" step="0.5" onchange="saveW('${session}','${ex.name}_L',this.value)"></div>
    </div>`;
  } else {
    h += `<div class="set-row">
      <div class="set-grp"><div class="set-lbl">weight (kg)</div><input type="number" class="set-inp" placeholder="—" value="${wS}" step="0.5" onchange="saveW('${session}','${ex.name}',this.value)"></div>
      <div class="set-grp"><div class="set-lbl">reps done</div><input type="number" class="set-inp" placeholder="—" step="1"></div>
    </div>`;
  }
  h += `</div>`;
  return h;
}

function renderWorkout() {
  const wo = WO_PLAN[selWoDay];
  const dayLabel = selWoDay === TODAY ? 'today' : DSHORT[DAYS.indexOf(selWoDay)];
  let h = '';
  if (wo.type === 'strength') {
    const wk = WORKOUTS[wo.session], weights = gs('weights_'+wo.session)||{}, done = gs('done_'+wo.session+'_'+getWeekKey());
    h += `<div class="wo-header" style="background:var(--green)"><div class="wo-session-label">${dayLabel}</div><div class="wo-session-name">${wk.name}</div><div class="wo-session-note">${wk.focus} &nbsp;·&nbsp; ${wo.note}</div></div>`;
    if (done) h += `<div class="done-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>logged this week</div>`;
    h += `<div class="sec">activation (2 min — after the walk)</div>`;
    wk.warmup.forEach((w, i) => {
      h += `<div class="warmup-item"><div class="warmup-num">${i+1}</div><div class="warmup-body"><div class="warmup-name">${w.name}</div><div class="warmup-dur">${w.dur}</div><div class="warmup-note">${w.note}</div></div></div>`;
    });
    h += `<div class="sec">exercises</div>`;
    wk.exercises.forEach(ex => { h += renderExCard(ex, wo.session, weights); });
    h += `<div class="sec">scoliosis core — 6 min finisher</div>`;
    SCOLIOSIS_BLOCK.forEach(m => {
      h += `<div class="corr-item"><div class="corr-header"><span class="corr-name">${m.name}</span><span class="corr-dur">${m.dur}</span></div><div class="corr-note">${m.note}</div></div>`;
    });
    h += `<button class="btn btn-primary btn-mt" onclick="markDone('${wo.session}')">mark session complete</button>`;
  } else if (wo.type === 'mobility') {
    h += `<div class="wo-header" style="background:var(--blue)"><div class="wo-session-label">${dayLabel}</div><div class="wo-session-name">${wo.label}</div><div class="wo-session-note">${wo.note}</div></div>`;
    h += `<div class="sec">corrective protocol</div>`;
    MOBILITY.forEach(m => {
      h += `<div class="corr-item"><div class="corr-header"><span class="corr-name">${m.name}</span><span class="corr-dur">${m.dur}</span></div><div class="corr-note">${m.note}</div></div>`;
    });
    h += `<div class="sec">scoliosis core — post-walk</div>`;
    SCOLIOSIS_BLOCK.forEach(m => {
      h += `<div class="corr-item"><div class="corr-header"><span class="corr-name">${m.name}</span><span class="corr-dur">${m.dur}</span></div><div class="corr-note">${m.note}</div></div>`;
    });
  } else {
    h += `<div class="rest-card"><div style="font-size:36px;margin-bottom:12px">${wo.type==='rest'?'&#9790;':'&#11835;'}</div><div class="rest-title">${wo.label}</div><div class="rest-note">${wo.note}</div></div>`;
  }
  document.getElementById('wo-content').innerHTML = h;
}
function saveW(session, ex, val) { const w=gs('weights_'+session)||{}; w[ex]=parseFloat(val)||''; ss('weights_'+session,w); }
function markDone(session) { ss('done_'+session+'_'+getWeekKey(),true); renderWorkout(); }

// ── recipes view ──
function renderRecipes() {
  const groups = { breakfast:[], 'lunch & dinner':[], snacks:[], desserts:[] };
  Object.entries(RECIPES).forEach(([id,r]) => groups[recCat(id)].push({id,...r}));
  let h = '';
  Object.entries(groups).forEach(([name, recipes]) => {
    if (!recipes.length) return;
    const col = CAT_COLORS[name] || 'var(--green)';
    h += `<div class="sec">${name}</div>`;
    recipes.forEach(r => {
      h += `<div class="rec-card" id="rc-${r.id}" onclick="toggleRec('${r.id}')">
        <div class="rec-bar" style="background:${col}"></div>
        <div class="rec-body">
          <div class="rec-title">${r.title}</div>
          <div class="rec-meta">
            ${r.tags.map(t=>`<span class="rec-tag" style="background:${col}18;color:${col}">${t}</span>`).join('')}
            <span class="rec-time">${r.time}</span>
          </div>
          <div class="rec-ingr">${r.ingr.join(' · ')}</div>
          <div class="rec-expanded">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--muted);margin-bottom:8px">method</div>
            ${r.steps.map((s,i)=>`<div class="step-item"><span class="step-n" style="background:${col}22;color:${col}">${i+1}</span><span>${s}</span></div>`).join('')}
          </div>
        </div>
      </div>`;
    });
  });
  document.getElementById('rec-list').innerHTML = h;
}
function toggleRec(id) { document.getElementById('rc-'+id).classList.toggle('open'); }
function openRecipeModal(id) {
  const r = RECIPES[id]; if (!r) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">${r.title}</div>
    <div class="modal-sub">${r.time} · ${r.tags.join(', ')}</div>
    <div class="modal-sec">ingredients</div>
    ${r.ingr.map(i=>`<div class="ingr-item"><span class="ingr-dot"></span>${i}</div>`).join('')}
    <div class="modal-sec" style="margin-top:16px">method</div>
    ${r.steps.map((s,i)=>`<div class="step-item"><span class="step-n" style="background:var(--green-light);color:var(--green)">${i+1}</span><span>${s}</span></div>`).join('')}`;
  document.getElementById('rec-modal').classList.add('open');
}
function closeModal(e) { if (e.target===document.getElementById('rec-modal')) document.getElementById('rec-modal').classList.remove('open'); }

// ── shopping view ──
function renderShopping() {
  const checked = gs('shop_checked')||[];
  let h = '';
  Object.entries(SHOPPING).forEach(([cat,items]) => {
    h += `<div class="sec">${cat}</div><div class="card" style="padding:0 16px">`;
    items.forEach(item => {
      const on = checked.includes(item.id);
      h += `<div class="shop-item${on?' checked':''}" onclick="toggleShop('${item.id}')"><div class="shop-check">${on?`<svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="white" stroke-width="2.5"><polyline points="2 6 5 9 10 3"/></svg>`:''}</div><span class="shop-name">${item.name}</span>${item.qty?`<span class="shop-qty">${item.qty}</span>`:''}</div>`;
    });
    h += `</div>`;
  });
  document.getElementById('shop-list').innerHTML = h;
}
function toggleShop(id) { const c=gs('shop_checked')||[]; const i=c.indexOf(id); if(i>=0)c.splice(i,1);else c.push(id); ss('shop_checked',c); renderShopping(); }
function clearChecks() { ss('shop_checked',[]); renderShopping(); }

// ── progress view ──
function renderProgress() {
  const log = gs('progress_log')||[], latest=log[log.length-1], prev=log[log.length-2];
  const start=log.length>0?log[0].weight:98, cur=latest?latest.weight:98;
  const delta = prev&&latest ? (latest.weight-prev.weight).toFixed(1) : null;
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">weight</div><div class="stat-val">${cur}<span class="stat-unit"> kg</span></div>
      <div class="stat-delta ${delta!==null&&parseFloat(delta)<=0?'d-down':'d-up'}">${delta!==null?(parseFloat(delta)>0?'+':'')+delta+' kg this week':'log first check-in'}</div></div>
    <div class="stat-card"><div class="stat-lbl">body fat</div><div class="stat-val">${latest&&latest.bodyFat?latest.bodyFat+'<span class="stat-unit"> %</span>':'—'}</div>
      <div class="stat-delta" style="color:var(--muted)">${log.length>0?'started: '+start+' kg':'starting: 98 kg'}</div></div>`;
  drawChart(log);
  const hist = document.getElementById('prog-hist');
  hist.innerHTML = !log.length ? `<div style="color:var(--muted);font-size:13px;padding:12px 0;text-align:center">no entries yet</div>`
    : [...log].reverse().map(e => { const d=new Date(e.date); return `<div class="log-entry"><span class="log-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span><div class="log-vals"><span class="log-val">${e.weight} kg</span>${e.bodyFat?`<span class="log-val">${e.bodyFat}<span style="font-weight:400;color:var(--muted)"> %</span></span>`:''}</div></div>`; }).join('');
}
function logProgress() {
  const w=parseFloat(document.getElementById('inp-weight').value), b=parseFloat(document.getElementById('inp-bf').value)||null;
  const inp=document.getElementById('inp-weight');
  if (!w) { inp.style.borderColor='var(--red)'; setTimeout(()=>inp.style.borderColor='',1500); return; }
  const log=gs('progress_log')||[]; log.push({date:new Date().toISOString(),weight:w,bodyFat:b}); ss('progress_log',log);
  document.getElementById('inp-weight').value=''; document.getElementById('inp-bf').value='';
  renderProgress();
}
function drawChart(log) {
  const cv=document.getElementById('w-chart'), ctx=cv.getContext('2d');
  const W=cv.offsetWidth||300, H=150, DPR=window.devicePixelRatio||1;
  cv.width=W*DPR; cv.height=H*DPR; ctx.scale(DPR,DPR);
  if (log.length < 2) {
    ctx.fillStyle='#9ca3af'; ctx.font='12px -apple-system,sans-serif'; ctx.textAlign='center';
    ctx.fillText(log.length===0?'log two check-ins to see your chart':'one more check-in to see your trend',W/2,H/2); return;
  }
  const ws=log.map(e=>e.weight), minW=Math.min(...ws)-1, maxW=Math.max(...ws)+1;
  const pL=38,pR=14,pT=14,pB=26, cW=W-pL-pR, cH=H-pT-pB;
  const xS=i=>pL+(i/(log.length-1))*cW, yS=w=>pT+(1-(w-minW)/(maxW-minW))*cH;
  ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=pT+(i/3)*cH;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();ctx.fillStyle='#9ca3af';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='right';ctx.fillText((maxW-(i/3)*(maxW-minW)).toFixed(1),pL-4,y+4);}
  ctx.beginPath(); ctx.moveTo(xS(0),yS(ws[0])); ws.forEach((w,i)=>{if(i>0)ctx.lineTo(xS(i),yS(w));}); ctx.lineTo(xS(ws.length-1),H-pB); ctx.lineTo(xS(0),H-pB); ctx.closePath(); ctx.fillStyle='rgba(45,106,79,0.1)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(xS(0),yS(ws[0])); ws.forEach((w,i)=>{if(i>0)ctx.lineTo(xS(i),yS(w));}); ctx.strokeStyle='#2d6a4f'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  ws.forEach((w,i)=>{ctx.beginPath();ctx.arc(xS(i),yS(w),4,0,Math.PI*2);ctx.fillStyle='#2d6a4f';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();});
  ctx.fillStyle='#9ca3af'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(log.length/4));
  log.forEach((e,i)=>{if(i%step===0||i===log.length-1){const d=new Date(e.date);ctx.fillText(d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}),xS(i),H-6);}});
}

init();
</script>
